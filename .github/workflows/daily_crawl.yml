name: Daily Media Crawl (바바더닷컴)

on:
  # 매일 오전 8시 KST (= 23:00 UTC 전날)
  schedule:
    - cron: "0 23 * * *"
  # 수동 실행 및 날짜 지정 재실행
  workflow_dispatch:
    inputs:
      target_date:
        description: "단일 날짜 (YYYY-MM-DD) — 비워두면 전일자 자동 적용"
        required: false
        default: ""
      date_from:
        description: "기간 시작 날짜 (YYYY-MM-DD)"
        required: false
        default: ""
      date_to:
        description: "기간 종료 날짜 (YYYY-MM-DD)"
        required: false
        default: ""
      allow_partial_upload:
        description: "일부 매체 실패 시에도 Sheets 업로드 진행 (1이면 허용)"
        required: false
        default: "0"

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      TZ: Asia/Seoul

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Chrome 설치
        uses: browser-actions/setup-chrome@v1

      - name: Chrome 버전 확인
        run: google-chrome --version

      - name: 크롤링 및 Sheets 업로드 실행
        env:
          TARGET_DATE:            ${{ github.event.inputs.target_date }}
          DATE_FROM:              ${{ github.event.inputs.date_from }}
          DATE_TO:                ${{ github.event.inputs.date_to }}
          ALLOW_PARTIAL_UPLOAD:   ${{ github.event.inputs.allow_partial_upload || '0' }}
          # 버즈빌
          BUZZVIL_EMAIL:          ${{ secrets.BUZZVIL_EMAIL }}
          BUZZVIL_PASSWORD:       ${{ secrets.BUZZVIL_PASSWORD }}
          # 아이스크린(ive)
          ISCREEN_ID:             ${{ secrets.ISCREEN_ID }}
          ISCREEN_PW:             ${{ secrets.ISCREEN_PW }}
          # 네이버쇼핑
          NAVER_ID:               ${{ secrets.NAVER_ID }}
          NAVER_PW:               ${{ secrets.NAVER_PW }}
          NAVER_COOKIE:           ${{ secrets.NAVER_COOKIE }}
          # 에디AI
          EDIAI_ID:               ${{ secrets.EDIAI_ID }}
          EDIAI_PW:               ${{ secrets.EDIAI_PW }}
          # Google Sheets 서비스 계정
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python main.py

      - name: 디버그 스크린샷 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: /tmp/*.png
          if-no-files-found: ignore

      - name: Slack 알림 전송
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GAS_RERUN_URL:     ${{ vars.GAS_RERUN_URL }}
          JOB_STATUS:        ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            ICON=":white_check_mark:"
            STATUS_TEXT="업로드 성공"
          else
            ICON=":x:"
            STATUS_TEXT="업로드 실패"
          fi
          TARGET=$(TZ=Asia/Seoul date -d 'yesterday' '+%Y-%m-%d' 2>/dev/null || TZ=Asia/Seoul date -v-1d '+%Y-%m-%d')
          RERUN_PART=""
          if [ -n "$GAS_RERUN_URL" ]; then
            RERUN_PART="\n<${GAS_RERUN_URL}|재실행>"
          fi
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL 미설정 — 알림 건너뜀"
            exit 0
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"${ICON} *[바바더닷컴 수기매체]* ${STATUS_TEXT}\n대상 날짜: \`${TARGET}\`${RERUN_PART}\"}"
